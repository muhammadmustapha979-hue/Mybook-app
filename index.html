<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Book Pro</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
  <h1>📒 My Book Pro</h1>
</header>

<main>

  <!-- Dashboard -->
  <section id="dashboard">
    <h2>Today's Summary</h2>
    <p>Sales: ₦<span id="sales">0</span></p>
    <p>Expenses: ₦<span id="expenses">0</span></p>
    <p>Profit: ₦<span id="profit">0</span></p>
  </section>

  <!-- Actions -->
  <section id="actions">
    <button onclick="openForm('sell')">I Sold</button>
    <button onclick="openForm('buy')">I Bought</button>
  </section>

  <!-- Form -->
  <section id="formSection" class="hidden">
    <h3 id="formTitle"></h3>

    <input type="text" id="item" placeholder="Item name" />
    <input type="number" id="amount" placeholder="Amount" />

    <label>
      <input type="checkbox" id="isDebt"> Debt?
    </label>

    <input type="text" id="debtor" placeholder="Debtor name" class="hidden"/>

    <button onclick="saveTransaction()">Save</button>
  </section>

  <!-- History -->
  <section id="history">
    <h2>Transactions</h2>
    <ul id="list"></ul>
  </section>

</main>

<script src="app.js"></script>
</body>
</html>
